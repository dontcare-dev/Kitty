<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>kitty.music · purr your beats</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b0b0f 0%, #1a1a24 100%);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* glossy animated background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(255, 180, 200, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(180, 160, 255, 0.1) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .app-container {
      width: 100%;
      max-width: 520px;
      background: rgba(20, 20, 30, 0.75);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 3.5rem;
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      padding: 2rem 1.8rem 2.2rem;
      position: relative;
      z-index: 2;
      color: #f5f0f9;
      transition: all 0.2s ease;
    }

    /* header */
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .brand-emoji {
      font-size: 2.7rem;
      filter: drop-shadow(0 8px 12px rgba(255, 140, 200, 0.6));
      background: transparent;
      animation: float 3s infinite ease-in-out;
    }
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0); }
    }
    .brand h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffb3d9, #c7b3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 15px rgba(255, 140, 200, 0.5);
    }

    /* forms & views */
    .view {
      display: none;
      flex-direction: column;
      gap: 1.25rem;
    }
    .view.active {
      display: flex;
    }

    .input-field {
      background: rgba(12, 12, 20, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 2.5rem;
      padding: 0.9rem 1.5rem;
      font-size: 1rem;
      color: #f0eaff;
      outline: none;
      transition: all 0.25s;
      width: 100%;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .input-field:focus {
      border-color: #ff9ed8;
      box-shadow: 0 0 20px rgba(255, 140, 180, 0.5);
      background: rgba(20, 15, 25, 0.8);
    }
    .input-field::placeholder {
      color: #8e8ea0;
      font-weight: 400;
    }

    .btn {
      background: linear-gradient(115deg, #ff8ec4, #b79aff);
      border: none;
      border-radius: 3rem;
      padding: 0.95rem 1.8rem;
      font-weight: 700;
      font-size: 1.1rem;
      color: #0c0b12;
      letter-spacing: 0.4px;
      cursor: pointer;
      box-shadow: 0 10px 25px -8px rgba(255, 130, 180, 0.7);
      transition: all 0.3s;
      backdrop-filter: blur(8px);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .btn:hover {
      filter: brightness(1.15);
      box-shadow: 0 18px 30px -6px rgba(230, 120, 230, 0.8);
      transform: scale(1.02);
    }
    .btn-outline {
      background: transparent;
      border: 1.5px solid rgba(255, 180, 210, 0.7);
      color: #ffcce0;
      box-shadow: none;
      backdrop-filter: blur(5px);
    }
    .btn-outline:hover {
      background: rgba(255, 180, 210, 0.12);
      box-shadow: 0 0 20px rgba(255, 160, 200, 0.5);
    }

    .flex-row {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      justify-content: space-between;
    }

    .track-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 0.3rem;
      margin: 0.5rem 0 0.2rem;
    }
    .track-item {
      background: rgba(30, 30, 42, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 2.2rem;
      padding: 0.7rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(255, 210, 240, 0.18);
      transition: 0.2s;
    }
    .track-item:hover {
      background: rgba(50, 45, 65, 0.7);
      border-color: #ffb3d9;
    }
    .track-info {
      display: flex;
      flex-direction: column;
      font-weight: 500;
    }
    .track-title {
      font-weight: 700;
      color: #ffeef7;
    }
    .track-artist {
      font-size: 0.75rem;
      color: #b7a9d4;
    }
    .play-btn {
      background: #ffb6d9;
      border: none;
      border-radius: 50%;
      width: 2.5rem;
      height: 2.5rem;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #1a0f1f;
      background: linear-gradient(135deg, #fda4cf, #c9adff);
      box-shadow: 0 6px 15px rgba(255, 140, 200, 0.6);
      transition: 0.2s;
    }
    .play-btn:hover {
      transform: scale(1.08);
    }

    .now-playing {
      background: rgba(15, 12, 22, 0.7);
      backdrop-filter: blur(25px);
      border-radius: 2.8rem;
      padding: 0.9rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid rgba(255, 200, 230, 0.25);
      margin: 0.5rem 0;
    }
    .np-emoji {
      font-size: 2.4rem;
    }

    .hidden {
      display: none !important;
    }

    .upload-area {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin-top: 0.3rem;
    }
    #audioFileInput {
      display: none;
    }
    .file-label {
      background: rgba(50, 40, 65, 0.5);
      border: 1px dashed #d9b3ff;
      border-radius: 2rem;
      padding: 0.9rem;
      text-align: center;
      cursor: pointer;
      color: #e1c7ff;
      transition: 0.2s;
      font-weight: 500;
    }
    .file-label:hover {
      background: rgba(80, 60, 100, 0.5);
      border-color: #ffb3d9;
    }

    .user-badge {
      background: rgba(255, 210, 240, 0.18);
      border-radius: 3rem;
      padding: 0.3rem 1.2rem;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    hr {
      border-color: rgba(255,255,255,0.1);
      margin: 0.6rem 0;
    }

    /* scrollbar */
    .track-list::-webkit-scrollbar {
      width: 5px;
    }
    .track-list::-webkit-scrollbar-thumb {
      background: #ffb3d9;
      border-radius: 10px;
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div class="brand">
    <span class="brand-emoji">🐱🎧</span>
    <h1>kitty.music</h1>
  </div>

  <!-- SIGNUP VIEW -->
  <div id="signupView" class="view active">
    <input type="text" id="signupName" class="input-field" placeholder="your name" autocomplete="off">
    <input type="email" id="signupEmail" class="input-field" placeholder="email@kitty.com" autocomplete="off">
    <input type="password" id="signupPassword" class="input-field" placeholder="password" autocomplete="off">
    <button class="btn" id="signupBtn">✨ create kitty account</button>
    <p style="text-align:center; font-size:0.9rem; color:#b9adcc;">already purring? <span id="goToLoginLink" style="color:#ffb3d9; cursor:pointer; font-weight:600;">log in</span></p>
  </div>

  <!-- LOGIN VIEW -->
  <div id="loginView" class="view">
    <input type="email" id="loginEmail" class="input-field" placeholder="email" autocomplete="off">
    <input type="password" id="loginPassword" class="input-field" placeholder="password" autocomplete="off">
    <button class="btn" id="loginBtn">🐾 log in</button>
    <p style="text-align:center; font-size:0.9rem; color:#b9adcc;">new meow? <span id="goToSignupLink" style="color:#ffb3d9; cursor:pointer; font-weight:600;">sign up</span></p>
  </div>

  <!-- MAIN PLAYER VIEW (after auth) -->
  <div id="playerView" class="view">
    <div class="flex-row">
      <div class="user-badge">
        <span>🐱</span> <span id="displayUserName"></span>
      </div>
      <button class="btn-outline btn" id="logoutBtn" style="padding:0.5rem 1.2rem; font-size:0.85rem;">logout</button>
    </div>

    <!-- Now playing -->
    <div class="now-playing" id="nowPlayingCard">
      <span class="np-emoji">🎵</span>
      <div style="flex:1;">
        <div style="font-weight:700;" id="nowPlayingTitle">nothing playing</div>
        <div style="font-size:0.8rem; color:#ccb6ff;" id="nowPlayingArtist">-</div>
      </div>
      <audio id="audioPlayer" controls style="max-width:120px; filter: invert(0.8) hue-rotate(260deg); border-radius:20px;"></audio>
    </div>

    <!-- Upload section -->
    <div class="upload-area">
      <input type="file" id="audioFileInput" accept="audio/*">
      <label for="audioFileInput" class="file-label">📁 choose audio file (mp3, wav, etc)</label>
      <div class="flex-row">
        <input type="text" id="customTitle" class="input-field" placeholder="track title" style="flex:2;">
        <button class="btn" id="uploadTrackBtn" style="flex:1; padding:0.9rem;">⬆️ upload</button>
      </div>
    </div>

    <hr>
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span style="font-weight:600;">🎶 your library</span>
      <span style="font-size:0.8rem; color:#c7b3ff;" id="trackCount">0 tracks</span>
    </div>
    <ul class="track-list" id="trackListContainer"></ul>
    <p style="font-size:0.75rem; color:#6b6382; text-align:center; margin-top:0.4rem;">no ads • just purrs</p>
  </div>
</div>

<script>
  (function() {
    // ------- kitty.music state -------
    const STORAGE_USERS = 'kitty_users';
    const STORAGE_CURRENT = 'kitty_currentUser';
    const STORAGE_TRACKS = 'kitty_tracks';

    // Views
    const signupView = document.getElementById('signupView');
    const loginView = document.getElementById('loginView');
    const playerView = document.getElementById('playerView');

    // Inputs & buttons
    const signupName = document.getElementById('signupName');
    const signupEmail = document.getElementById('signupEmail');
    const signupPassword = document.getElementById('signupPassword');
    const signupBtn = document.getElementById('signupBtn');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const goToLoginLink = document.getElementById('goToLoginLink');
    const goToSignupLink = document.getElementById('goToSignupLink');
    const logoutBtn = document.getElementById('logoutBtn');
    const displayUserName = document.getElementById('displayUserName');
    const audioPlayer = document.getElementById('audioPlayer');
    const nowPlayingTitle = document.getElementById('nowPlayingTitle');
    const nowPlayingArtist = document.getElementById('nowPlayingArtist');
    const trackListContainer = document.getElementById('trackListContainer');
    const trackCountSpan = document.getElementById('trackCount');
    const customTitleInput = document.getElementById('customTitle');
    const audioFileInput = document.getElementById('audioFileInput');
    const uploadTrackBtn = document.getElementById('uploadTrackBtn');

    // Current user data
    let currentUser = null; // { name, email }

    // ---------- helpers ----------
    function getUsers() {
      const data = localStorage.getItem(STORAGE_USERS);
      return data ? JSON.parse(data) : [];
    }

    function saveUsers(users) {
      localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
    }

    function getTracks() {
      const data = localStorage.getItem(STORAGE_TRACKS);
      return data ? JSON.parse(data) : [];
    }

    function saveTracks(tracks) {
      localStorage.setItem(STORAGE_TRACKS, JSON.stringify(tracks));
    }

    function setCurrentUser(user) {
      currentUser = user;
      if (user) {
        localStorage.setItem(STORAGE_CURRENT, JSON.stringify(user));
      } else {
        localStorage.removeItem(STORAGE_CURRENT);
      }
    }

    function loadCurrentUser() {
      const stored = localStorage.getItem(STORAGE_CURRENT);
      if (stored) {
        try {
          currentUser = JSON.parse(stored);
        } catch (e) {
          currentUser = null;
        }
      } else {
        currentUser = null;
      }
    }

    // Switch views
    function showView(view) {
      signupView.classList.remove('active');
      loginView.classList.remove('active');
      playerView.classList.remove('active');
      view.classList.add('active');
    }

    function updatePlayerUI() {
      if (!currentUser) return;
      displayUserName.textContent = currentUser.name || 'kitty';
      renderTrackList();
    }

    // Render tracks for current user
    function renderTrackList() {
      if (!currentUser) return;
      const allTracks = getTracks();
      const userTracks = allTracks.filter(t => t.userEmail === currentUser.email);
      trackCountSpan.textContent = `${userTracks.length} track${userTracks.length !== 1 ? 's' : ''}`;
      trackListContainer.innerHTML = '';

      if (userTracks.length === 0) {
        trackListContainer.innerHTML = '<li style="padding:1rem; color:#9b8eb5; text-align:center;">✨ no tracks yet. upload something purrfect.</li>';
        return;
      }

      userTracks.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0)).forEach(track => {
        const li = document.createElement('li');
        li.className = 'track-item';
        li.innerHTML = `
          <div class="track-info">
            <span class="track-title">${escapeHTML(track.title) || 'untitled'}</span>
            <span class="track-artist">🐱 ${escapeHTML(track.artist || 'kitty')}</span>
          </div>
          <button class="play-btn" data-track-id="${track.id}">▶</button>
        `;
        trackListContainer.appendChild(li);
      });

      // Attach play events
      document.querySelectorAll('.play-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const trackId = btn.getAttribute('data-track-id');
          playTrackById(trackId);
        });
      });
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    function playTrackById(trackId) {
      const allTracks = getTracks();
      const track = allTracks.find(t => t.id === trackId);
      if (!track) {
        alert('track not found.');
        return;
      }
      // set audio source
      audioPlayer.src = track.dataURL;
      audioPlayer.load();
      audioPlayer.play().catch(e => console.warn('playback prevented', e));
      nowPlayingTitle.textContent = track.title || 'unknown';
      nowPlayingArtist.textContent = track.artist || 'kitty';
    }

    // Upload new track
    function uploadTrack() {
      if (!currentUser) {
        alert('please log in first');
        return;
      }
      const file = audioFileInput.files[0];
      if (!file) {
        alert('choose an audio file 🐾');
        return;
      }
      const title = customTitleInput.value.trim() || file.name.replace(/\.[^/.]+$/, "") || 'meow track';
      const reader = new FileReader();
      reader.onload = function(e) {
        const dataURL = e.target.result;
        const newTrack = {
          id: 'track_' + Date.now() + Math.random().toString(36).substr(2, 6),
          title: title,
          artist: currentUser.name || 'kitty',
          userEmail: currentUser.email,
          dataURL: dataURL,
          addedAt: Date.now()
        };
        const tracks = getTracks();
        tracks.push(newTrack);
        saveTracks(tracks);
        // clear inputs
        audioFileInput.value = '';
        customTitleInput.value = '';
        renderTrackList();
        // optionally play immediately
        playTrackById(newTrack.id);
      };
      reader.readAsDataURL(file);
    }

    // Authentication
    function signup() {
      const name = signupName.value.trim();
      const email = signupEmail.value.trim().toLowerCase();
      const password = signupPassword.value.trim();

      if (!name || !email || !password) {
        alert('fill all fields, kitty!');
        return;
      }
      if (!email.includes('@')) {
        alert('please enter a valid email');
        return;
      }
      const users = getUsers();
      if (users.find(u => u.email === email)) {
        alert('this email already has an account 😿');
        return;
      }
      const newUser = { name, email, password };
      users.push(newUser);
      saveUsers(users);
      setCurrentUser({ name, email });
      showView(playerView);
      updatePlayerUI();
      clearAuthFields();
    }

    function login() {
      const email = loginEmail.value.trim().toLowerCase();
      const password = loginPassword.value.trim();
      if (!email || !password) {
        alert('enter email and password');
        return;
      }
      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);
      if (!user) {
        alert('invalid credentials 😿');
        return;
      }
      setCurrentUser({ name: user.name, email: user.email });
      showView(playerView);
      updatePlayerUI();
      clearAuthFields();
    }

    function logout() {
      setCurrentUser(null);
      audioPlayer.pause();
      audioPlayer.src = '';
      nowPlayingTitle.textContent = 'nothing playing';
      nowPlayingArtist.textContent = '-';
      showView(signupView);
      // keep signup view default
    }

    function clearAuthFields() {
      signupName.value = '';
      signupEmail.value = '';
      signupPassword.value = '';
      loginEmail.value = '';
      loginPassword.value = '';
    }

    // Event Listeners
    signupBtn.addEventListener('click', signup);
    loginBtn.addEventListener('click', login);
    logoutBtn.addEventListener('click', logout);
    goToLoginLink.addEventListener('click', () => {
      clearAuthFields();
      showView(loginView);
    });
    goToSignupLink.addEventListener('click', () => {
      clearAuthFields();
      showView(signupView);
    });
    uploadTrackBtn.addEventListener('click', uploadTrack);

    // Initial load
    loadCurrentUser();
    if (currentUser) {
      showView(playerView);
      updatePlayerUI();
      // stop any previous audio
      audioPlayer.src = '';
      nowPlayingTitle.textContent = 'nothing playing';
      nowPlayingArtist.textContent = '-';
    } else {
      showView(signupView);
    }

    // Also update when audio metadata changes (optional)
    audioPlayer.addEventListener('play', () => {
      // can add visual feedback
    });

    // Handle if user closes and reopens: keep clean
    window.addEventListener('load', () => {
      if (currentUser) {
        renderTrackList();
      }
    });

  })();
</script>
</body>
</html>
